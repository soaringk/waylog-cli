name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            archive: waylog-aarch64-apple-darwin.tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: waylog-x86_64-apple-darwin.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive: waylog-aarch64-unknown-linux-musl.tar.gz
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive: waylog-x86_64-unknown-linux-musl.tar.gz
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: waylog-aarch64-pc-windows-msvc.zip
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            archive: waylog-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl compiler
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          echo "CC=musl-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke-test Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: "target/${{ matrix.target }}/release/waylog --version"

      - name: Smoke-test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: "& target/${{ matrix.target }}/release/waylog.exe --version"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive }}" waylog
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.archive }}" | cut -d ' ' -f 1 > "dist/${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.archive }}" | cut -d ' ' -f 1 > "dist/${{ matrix.archive }}.sha256"
          fi

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $archive = "dist/${{ matrix.archive }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/waylog.exe" -DestinationPath $archive
          (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant() |
            Set-Content -Encoding ascii "$archive.sha256"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo package version
        shell: bash
        run: |
          package_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "v${package_version}" = "${GITHUB_REF_NAME}"

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --generate-notes \
              --title "WayLog ${GITHUB_REF_NAME}"
